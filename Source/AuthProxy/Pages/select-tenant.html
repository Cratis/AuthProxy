<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Tenant</title>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2.5rem 3rem; text-align: center; max-width: 480px; width: 100%; }
        h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 .75rem; color: #333; }
        p  { color: #666; margin: 0 0 1.5rem; }
        .tenants { display: flex; flex-direction: column; gap: .75rem; }
        .tenant-btn { display: block; padding: .75rem 1.5rem; border-radius: 6px; background: #0078d4; color: #fff; text-decoration: none; font-size: 1rem; font-weight: 600; transition: background .15s; }
        .tenant-btn:hover { background: #005a9e; }
        .error { color: #c00; font-size: .9rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Select tenant</h1>
        <p>Choose which tenant you want to continue with:</p>
        <div id="tenants" class="tenants"></div>
        <p id="error" class="error" style="display:none">
            Unable to load tenant options. Please refresh and try again.
        </p>
    </div>
    <script>
        (function () {
            function getCookie(name) {
                var match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.*+?^=!:${}()|[\]\/\\])/g, '\\$1') + '=([^;]*)'));
                return match ? decodeURIComponent(match[1]) : null;
            }

            var tenantsJson = getCookie('.cratis-tenants');
            var container = document.getElementById('tenants');
            var errorEl = document.getElementById('error');

            if (!tenantsJson) {
                errorEl.style.display = '';
                return;
            }

            var tenants;
            try {
                tenants = JSON.parse(tenantsJson);
            } catch (e) {
                errorEl.style.display = '';
                return;
            }

            if (!tenants || tenants.length === 0) {
                errorEl.style.display = '';
                return;
            }

            var returnUrl = window.location.pathname + window.location.search;

            tenants.forEach(function (tenant) {
                var a = document.createElement('a');
                a.href = '/.cratis/select-tenant?tenantId=' + encodeURIComponent(tenant.id) + '&returnUrl=' + encodeURIComponent(returnUrl);
                a.textContent = tenant.name;
                a.className = 'tenant-btn';
                container.appendChild(a);
            });
        }());
    </script>
</body>
</html>
