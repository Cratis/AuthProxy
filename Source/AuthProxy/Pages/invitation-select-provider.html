<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2.5rem 3rem; text-align: center; max-width: 480px; width: 100%; }
        h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 .75rem; color: #333; }
        p  { color: #666; margin: 0 0 1.5rem; }
        .providers { display: flex; flex-direction: column; gap: .75rem; }
        .provider-btn { display: block; padding: .75rem 1.5rem; border-radius: 6px; background: #0078d4; color: #fff; text-decoration: none; font-size: 1rem; font-weight: 600; transition: background .15s; }
        .provider-btn:hover { background: #005a9e; }
        .error { color: #c00; font-size: .9rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sign In</h1>
        <p>Choose how you want to sign in to accept your invitation:</p>
        <div id="providers" class="providers"></div>
        <p id="error" class="error" style="display:none">
            Unable to load sign-in options. Please try opening your invitation link again.
        </p>
    </div>
    <script>
        (function () {
            function getCookie(name) {
                var match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.*+?^=!:${}()|[\]\/\\])/g, '\\$1') + '=([^;]*)'));
                return match ? decodeURIComponent(match[1]) : null;
            }

            var providersJson = getCookie('.cratis-providers');
            var container = document.getElementById('providers');
            var errorEl = document.getElementById('error');

            if (!providersJson) {
                errorEl.style.display = '';
                return;
            }

            var providers;
            try {
                providers = JSON.parse(providersJson);
            } catch (e) {
                errorEl.style.display = '';
                return;
            }

            if (!providers || providers.length === 0) {
                errorEl.style.display = '';
                return;
            }

            providers.forEach(function (provider) {
                var a = document.createElement('a');
                a.href = provider.loginUrl;
                a.textContent = 'Sign in with ' + provider.name;
                a.className = 'provider-btn';
                container.appendChild(a);
            });
        }());
    </script>
</body>
</html>
