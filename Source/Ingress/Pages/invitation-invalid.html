<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invalid Invitation</title>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2.5rem 3rem; text-align: center; max-width: 480px; }
        h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 .75rem; color: #333; }
        p  { color: #666; margin: 0 0 1rem; }
        p:last-child { margin: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Invalid Invitation</h1>
        <p>The invitation link you followed is not valid.</p>
        <p>Please check that you used the full link from the invitation email, or request a new invitation.</p>
    </div>
</body>
</html>
