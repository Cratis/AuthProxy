name: Publish

env:
  DOTNET_VERSION: "10.0.x"
  NUGET_OUTPUT: ./Artifacts/NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
        default: '0.0.0'
        type: string
      release-notes:
        description: 'Release notes'
        required: true
        default: 'No release notes'
        type: string

  pull_request:
    types: [closed]
    branches:
      - "**"
    paths:
      - "Source/**"


permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      publish: ${{ steps.release.outputs.should-publish }}
      prerelease: ${{ steps.release.outputs.prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Release
        id: release
        uses: cratis/release-action@v1
        with:
          version: ${{ github.event.inputs.version }}
          release-notes: ${{ github.event.inputs.release-notes }}

  frontend:
    if: needs.release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    needs: [release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        working-directory: ./Source/Web
        run: npm ci

      - name: Build frontend
        working-directory: ./Source/Web
        run: npm run build

      # Hand the built frontend to the dotnet-publish job. Artifacts (unlike the Actions
      # cache) are writable on pull_request-triggered runs, which this workflow is.
      - name: Upload frontend output
        uses: actions/upload-artifact@v4
        with:
          name: frontend-wwwroot
          path: ./Source/AuthProxy/wwwroot
          retention-days: 1
          include-hidden-files: true

  dotnet-publish:
    if: needs.release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    needs: [release, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend output
        uses: actions/download-artifact@v4
        with:
          name: frontend-wwwroot
          path: ./Source/AuthProxy/wwwroot

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish Source/AuthProxy/AuthProxy.csproj -c Release -o Source/AuthProxy/out -p:Version=${{ needs.release.outputs.version }}

      # Hand the published binaries to the publish-docker job.
      - name: Upload published output
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-out
          path: ./Source/AuthProxy/out
          retention-days: 1
          include-hidden-files: true

  publish-docker:
    if: needs.release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    needs: [release, dotnet-publish]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download published output
        uses: actions/download-artifact@v4
        with:
          name: dotnet-out
          path: ./Source/AuthProxy/out

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare Docker tags
        id: docker-tags
        run: |
          TAGS="cratis/authproxy:${{ needs.release.outputs.version }}"
          if [ "${{ needs.release.outputs.prerelease }}" != "true" ]; then
            TAGS="${TAGS}\ncratis/authproxy:latest"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo -e "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: Docker/Development/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.release.outputs.version }}

  publish-nuget:
    if: needs.release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Remove any existing artifacts
        run: rm -rf ${{ env.NUGET_OUTPUT }}

      - name: Pack Aspire hosting package
        run: dotnet pack Source/Aspire/Aspire.csproj --configuration Release -o ${{ env.NUGET_OUTPUT }} -p:PackageVersion=${{ needs.release.outputs.version }}

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push NuGet package
        run: dotnet nuget push --skip-duplicate '${{ env.NUGET_OUTPUT }}/*.nupkg' --timeout 900 --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
